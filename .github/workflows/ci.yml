name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (emacs ${{ matrix.emacs_version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version: ["30.1"]
        include:
          - emacs_version: snapshot
            experimental: true
    continue-on-error: ${{ matrix.experimental == true }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Emacs ${{ matrix.emacs_version }}
        uses: purcell/setup-emacs@v8.0
        with:
          version: ${{ matrix.emacs_version }}

      - name: Cache Elpaca packages
        uses: actions/cache@v4
        with:
          path: elpaca
          key: elpaca-${{ matrix.emacs_version }}-${{ hashFiles('init.el', 'components.org', 'config.org', 'components/*.org') }}
          restore-keys: |
            elpaca-${{ matrix.emacs_version }}-

      - name: Tangle and byte-compile config
        run: make compile
